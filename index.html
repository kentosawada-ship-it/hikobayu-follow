<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIKOBAYU｜フォロー管理</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f8faf8;
      color: #333;
      line-height: 1.6;
    }

    /* ヘッダー */
    .header {
      background: #fff;
      border-bottom: 2px solid #d4e8d0;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 20px;
      color: #2d5a27;
      font-weight: 700;
    }
    .header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      font-size: 14px;
      color: #666;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-actions button, .header-actions select {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
    }
    .header-actions button:hover { background: #f0f0f0; }

    /* フィルターバー */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar label { font-size: 13px; color: #666; margin-right: 4px; }
    .filter-btn {
      padding: 5px 14px;
      border: 1px solid #ccc;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #555;
      font-weight: 500;
    }
    .filter-btn.active {
      background: #2d5a27;
      color: #fff;
      border-color: #2d5a27;
    }
    .filter-btn:hover { opacity: 0.85; }

    /* 送信者セレクト */
    .sender-select-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    .sender-select-wrap label { font-size: 13px; color: #666; }
    .sender-select {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      color: #333;
      background: #fff;
    }

    /* メインコンテンツ */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #888;
      font-size: 15px;
    }
    .loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #5a9e4b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 案件カード */
    .card {
      background: #fff;
      border: 1px solid #e0e8de;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d5a27;
    }
    .card-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-見込み段階 { background: #e8e8e8; color: #555; }
    .badge-提案済み   { background: #dbeafe; color: #2563eb; }
    .badge-検討中     { background: #fef3c7; color: #d97706; }
    .badge-反応待ち   { background: #ffe4e4; color: #c0392b; }
    .badge-反応なし   { background: #f0f0f0; color: #999; }
    .badge-industry   { background: #f3e8ff; color: #7c3aed; }
    .badge-assignee   { background: #e0f2fe; color: #0369a1; font-size: 10px; }

    /* コンテキスト入力エリア */
    .context-section {
      padding: 10px 20px 0;
      border-top: 1px solid #f0f0f0;
    }
    .context-section label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    .context-section label span {
      background: #f0f7ee;
      color: #5a9e4b;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 4px;
    }
    .context-textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 54px;
      font-family: inherit;
      color: #444;
    }
    .context-textarea:focus {
      outline: none;
      border-color: #5a9e4b;
      box-shadow: 0 0 0 2px rgba(90,158,75,0.15);
    }

    /* 添付資料セクション */
    .attach-section {
      padding: 10px 20px;
      border-top: 1px solid #f0f0f0;
    }
    .attach-section label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 6px;
    }
    .attach-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .attach-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #555;
      user-select: none;
    }
    .attach-chip.selected {
      background: #e8f5e3;
      border-color: #5a9e4b;
      color: #2d5a27;
    }
    .attach-chip:hover { border-color: #999; }
    .attach-empty {
      font-size: 12px;
      color: #aaa;
    }

    .btn-regen {
      background: #f0f7ee;
      color: #2d5a27;
      border: 1px solid #b6d9b0;
    }

    .card-info {
      padding: 12px 20px;
      font-size: 13px;
      color: #666;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .card-info span { white-space: nowrap; }

    /* メールセクション */
    .mail-section {
      padding: 16px 20px;
      border-top: 1px solid #f0f0f0;
    }
    .mail-section.generating {
      text-align: center;
      padding: 24px;
      color: #888;
    }
    .mail-subject {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }
    .mail-subject-input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .mail-body-textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.7;
      min-height: 160px;
      resize: vertical;
      font-family: inherit;
    }
    .mail-subject-input:focus, .mail-body-textarea:focus {
      outline: none;
      border-color: #5a9e4b;
      box-shadow: 0 0 0 2px rgba(90,158,75,0.15);
    }

    /* アクションボタン */
    .card-actions {
      padding: 12px 20px 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-gmail { background: #4285f4; color: #fff; }
    .btn-done { background: #5a9e4b; color: #fff; }
    .btn-done:disabled { background: #ccc; cursor: not-allowed; }
    .btn-done.completed { background: #e0e0e0; color: #888; }

    /* 設定モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 16px; color: #2d5a27; margin-bottom: 16px; }
    .modal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .modal-item-info { flex: 1; }
    .modal-item-info .name { font-weight: 600; color: #333; }
    .modal-item-info .desc { font-size: 11px; color: #888; }
    .modal-item-info .url { font-size: 11px; color: #4285f4; word-break: break-all; }
    .modal-item-actions { display: flex; gap: 6px; }
    .modal-item-actions button {
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      background: #fff;
    }
    .modal-item-actions button.del { color: #c00; border-color: #fcc; }
    .modal-add {
      margin-top: 12px;
      padding: 12px;
      background: #f8faf8;
      border-radius: 8px;
    }
    .modal-add input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .modal-add button {
      padding: 6px 16px;
      background: #5a9e4b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .modal-close {
      margin-top: 12px;
      padding: 8px 20px;
      background: #eee;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }

    /* 空状態 */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .empty h2 { font-size: 18px; margin-bottom: 8px; color: #5a9e4b; }

    /* タブナビゲーション */
    .tab-nav {
      display: flex;
      gap: 0;
      margin-top: 12px;
      border-bottom: 2px solid #e0e8de;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      color: #888;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #2d5a27;
      border-bottom-color: #2d5a27;
    }
    .tab-btn:hover { color: #5a9e4b; }

    /* 取引先フィルターバー */
    .client-filter-bar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* フォロー種別セレクト */
    .follow-type-select {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      color: #333;
      background: #fff;
      min-width: 140px;
    }


    /* レスポンシブ */
    @media (max-width: 600px) {
      .header { padding: 14px 16px; }
      .header h1 { font-size: 17px; }
      .card-header { flex-direction: column; }
      .card-actions { flex-direction: column; }
      .btn { justify-content: center; }
      .filter-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>HIKOBAYU フォロー管理</h1>
    <div class="header-meta">
      <span id="dateInfo"></span>
      <div class="header-actions">
        <button onclick="location.reload()">&#x1f504; 更新</button>
        <button onclick="openAttachSettings()">&#x1f4ce; 資料管理</button>
        <button onclick="openTemplateSettings()">&#x1f4dd; 定型文管理</button>
        <button onclick="window.open('https://www.notion.so/3048d9485aa9804a8d3dc13b01c2394e')">&#x1f4ca; Notion</button>
      </div>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="sales" onclick="switchTab('sales')">&#x1f579; 営業フォロー</button>
      <button class="tab-btn" data-tab="clients" onclick="switchTab('clients')">&#x1f91d; 取引先フォロー</button>
    </div>
    <!-- 営業フォロー用フィルター -->
    <div id="salesFilters">
      <div class="filter-bar">
        <label>担当：</label>
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全件</button>
        <button class="filter-btn" data-filter="佳代" onclick="setFilter('佳代')">佳代</button>
        <button class="filter-btn" data-filter="健人" onclick="setFilter('健人')">健人</button>
      </div>
      <div class="sender-select-wrap">
        <label>送信元：</label>
        <select class="sender-select" id="senderSelect"></select>
      </div>
    </div>
    <!-- 取引先フォロー用フィルター -->
    <div id="clientFilters" style="display:none;">
      <div class="client-filter-bar">
        <label>チャネル：</label>
        <button class="filter-btn active" data-channel="all" onclick="setClientChannel('all')">すべて</button>
        <button class="filter-btn" data-channel="freee" onclick="setClientChannel('freee')">freee/直接</button>
        <button class="filter-btn" data-channel="goooods" onclick="setClientChannel('goooods')">goooods</button>
      </div>
      <div class="client-filter-bar" style="margin-top:6px;">
        <label>状況：</label>
        <button class="filter-btn active" data-follow="all" onclick="setClientFollowFilter('all')">すべて</button>
        <button class="filter-btn" data-follow="未対応" onclick="setClientFollowFilter('未対応')">未対応のみ</button>
      </div>
      <div class="sender-select-wrap">
        <label>送信元：</label>
        <select class="sender-select" id="clientSenderSelect"></select>
      </div>
    </div>
  </div>

  <div class="container" id="main">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      案件を読み込み中...
    </div>
  </div>

  <!-- 添付資料設定モーダル -->
  <div class="modal-overlay" id="attachModal">
    <div class="modal">
      <h2>&#x1f4ce; よく使う添付資料</h2>
      <div id="attachModalList"></div>
      <div class="modal-add">
        <input id="newAttachName" placeholder="資料名（例：営業資料）">
        <input id="newAttachUrl" placeholder="Google Drive 共有リンク">
        <input id="newAttachDesc" placeholder="説明（任意）">
        <button onclick="addAttachment()">追加</button>
      </div>
      <button class="modal-close" onclick="closeAttachSettings()">閉じる</button>
    </div>
  </div>

  <!-- 定型文テンプレート管理モーダル -->
  <div class="modal-overlay" id="templateModal">
    <div class="modal" style="max-width:600px;">
      <h2>&#x1f4dd; 定型文テンプレート</h2>
      <p style="font-size:12px;color:#888;margin-bottom:12px;">登録した定型文は、各カードの入力欄にワンクリックで挿入できます。</p>
      <div id="templateModalList"></div>
      <div class="modal-add">
        <input id="newTemplateName" placeholder="テンプレート名（例：新商品ご案内）">
        <textarea id="newTemplateText" placeholder="定型文の本文を入力…" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px 8px;font-size:13px;min-height:80px;resize:vertical;font-family:inherit;margin-bottom:6px;"></textarea>
        <input id="newTemplateImage" placeholder="画像URL（任意・Google DriveやShopifyなど）">
        <button onclick="addTemplate()">追加</button>
      </div>
      <button class="modal-close" onclick="closeTemplateSettings()">閉じる</button>
    </div>
  </div>

<script>
// === グローバル状態 ===
let caseData = [];
let senderAccounts = [];
let attachments = [];
let currentFilter = localStorage.getItem('hikobayuFilter') || 'all';
let originalMails = {}; // index -> { subject, body } 生成時の原文を保持
let templates = []; // 定型文テンプレート

// 取引先タブ用
let currentTab = location.hash === '#clients' ? 'clients' : 'sales';
let clientData = [];
let clientChannel = 'all';
let clientFollowFilter = 'all';
let clientOriginalMails = {};


// === ユーティリティ ===
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return str.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// === Notionプロパティ抽出 ===
function extractProps(page) {
  const p = page.properties;
  return {
    id: page.id,
    name: p['案件名']?.title?.[0]?.plain_text || '（無題）',
    email: p['メールアドレス']?.email || '',
    industry: (p['営業属性']?.multi_select || [])[0]?.name || '',
    memo: p['初回接触メモ']?.rich_text?.[0]?.plain_text || '',
    status: (p['ステータス']?.multi_select || []).map(s => s.name),
    followDate: p['次回フォロー日']?.date?.start || '',
    nextAction: p['次のアクション']?.rich_text?.[0]?.plain_text || '',
    contact: p['担当者']?.rich_text?.[0]?.plain_text || '',
    sampleDate: p['サンプル送付日']?.date?.start || '',
    assignee: (p['責任者']?.people || []).map(u => u.name).join('・') || '',
  };
}

// === 担当者フィルター ===
function setFilter(filter) {
  currentFilter = filter;
  localStorage.setItem('hikobayuFilter', filter);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  init();
}

// === 送信元選択 ===
function getSelectedSender() {
  const sel = document.getElementById('senderSelect');
  return senderAccounts.find(s => s.id === sel.value) || senderAccounts[0];
}

function getSelectedSenderEmail() {
  return getSelectedSender()?.email || '';
}

// === Gmailリンク生成 ===
function createGmailLink(to, subject, body) {
  const from = getSelectedSenderEmail();
  const params = new URLSearchParams({ to, su: subject, body });
  if (from) params.set('from', from);
  return `https://mail.google.com/mail/?view=cm&${params.toString()}`;
}

// === 添付資料のリンクをメール本文に追加 ===
function getSelectedAttachLinks(index) {
  const chips = document.querySelectorAll(`#attach-panel-${index} .attach-chip.selected`);
  if (chips.length === 0) return '';
  let links = '\n\n---\n【添付資料】\n';
  chips.forEach(chip => {
    const name = chip.dataset.name;
    const url = chip.dataset.url;
    if (url) links += `${name}: ${url}\n`;
  });
  return links;
}

// === ステータスに応じた次回フォロー日 ===
function calcNextFollow(status) {
  const t = today();
  const s = (status || [])[0] || '';
  if (s === '見込み段階') return { date: addDays(t, 5), action: 'フォローメール送信' };
  if (s === '提案済み')   return { date: addDays(t, 7), action: '返答確認・次回提案' };
  if (s === '検討中')     return { date: addDays(t, 7), action: '検討状況の確認' };
  if (s === '反応待ち')   return { date: addDays(t, 10), action: '再アプローチ' };
  return { date: addDays(t, 7), action: 'フォロー継続' };
}

// === カードHTML生成 ===
function renderCard(item, index) {
  const statusName = item.status[0] || '';
  const statusBadge = statusName ? `<span class="badge badge-${statusName}">${statusName}</span>` : '';
  const indBadge = item.industry ? `<span class="badge badge-industry">${item.industry}</span>` : '';
  const assigneeBadge = item.assignee ? `<span class="badge badge-assignee">${item.assignee}</span>` : '';

  // 添付資料チップ
  let attachHtml = '';
  if (attachments.length > 0) {
    attachHtml = attachments.map(a =>
      `<span class="attach-chip" data-id="${a.id}" data-name="${escapeAttr(a.name)}" data-url="${escapeAttr(a.driveUrl || '')}" onclick="this.classList.toggle('selected')" title="${escapeAttr(a.description || '')}">${a.name}</span>`
    ).join('');
  } else {
    attachHtml = '<span class="attach-empty">資料未登録（ヘッダーの「資料管理」から追加）</span>';
  }

  return `
    <div class="card" id="card-${index}">
      <div class="card-header">
        <span class="card-title">${escapeHtml(item.name)}</span>
        <div class="card-badges">${assigneeBadge}${statusBadge}${indBadge}</div>
      </div>

// === メール生成 ===
async function generateMail(index) {
  const item = caseData[index];
  const extraContext = document.getElementById(`context-${index}`)?.value || '';
  const mailEl = document.getElementById(`mail-${index}`);
  mailEl.className = 'mail-section generating';
  mailEl.innerHTML = `<div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto 6px;"></div>メール文を生成中...`;
  document.getElementById(`actions-${index}`).style.display = 'none';

  const sender = getSelectedSender();

  try {
    const res = await fetch('/api/claude/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        caseInfo: {
          name: item.name,
          contact: item.contact,
          industry: item.industry,
          status: item.status,
          nextAction: item.nextAction,
          memo: item.memo,
          sampleDate: item.sampleDate,
          extraContext,
          today: today()
        },
        senderId: sender.id
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const jsonMatch = text.match(/\{[\s\S]*"subject"[\s\S]*"body"[\s\S]*\}/);
    if (jsonMatch) {
      const mail = JSON.parse(jsonMatch[0]);
      renderMailSection(index, item, mail.subject, mail.body);
    } else {
      throw new Error('メール生成結果のパースに失敗');
    }
  } catch (err) {
    mailEl.classList.remove('generating');
    mailEl.innerHTML = `<div style="color:#c00;padding:8px;">メール生成エラー: ${err.message}</div>`;
  }
}

async function regenerateMail(index) {
  await generateMail(index);
}

// === 送信済み（学習データ保存 + Notion更新） ===
async function markDone(index) {
  const item = caseData[index];
  const btn = document.getElementById(`done-${index}`);
  btn.disabled = true;
  btn.textContent = '更新中...';

  const next = calcNextFollow(item.status);

  // 学習データ保存: 生成文と編集後の差分
  const orig = originalMails[index];
  const editedSubject = document.getElementById(`subject-${index}`).value;
  const editedBody = document.getElementById(`body-${index}`).value;

  if (orig && (orig.subject !== editedSubject || orig.body !== editedBody)) {
    try {
      await fetch('/api/email-history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          caseName: item.name,
          industry: item.industry,
          status: item.status,
          originalSubject: orig.subject,
          originalBody: orig.body,
          editedSubject,
          editedBody,
        })
      });
    } catch (e) {
      console.warn('学習データ保存エラー:', e);
    }
  }

  // メール履歴をNotionページに追記
  if (editedSubject && editedBody) {
    const sender = getSelectedSender();
    try {
      await fetch(`/api/notion/append-email/${item.id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          subject: editedSubject,
          body: editedBody,
          senderName: sender.signature,
          date: today(),
        })
      });
    } catch (e) {
      console.warn('メール履歴保存エラー:', e);
    }
  }

  try {
    const body = {};
    if (next.date) body.nextFollowDate = next.date;
    if (next.action) body.nextAction = next.action;

    const res = await fetch(`/api/notion/update/${item.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error('更新に失敗しました');

    btn.classList.add('completed');
    btn.innerHTML = `&#x2705; 完了（次回：${next.date}）`;
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '送信済み（再試行）';
    alert('Notion更新エラー: ' + err.message);
  }
}

      body: JSON.stringify({
        nextFollowDate: nextDate,
        followStatus: '完了',
        followType: selectedTypes.length > 0 ? selectedTypes : item.followTypes,
      })
    });
    if (!res.ok) throw new Error('更新に失敗しました');

    btn.classList.add('completed');
    btn.innerHTML = `&#x2705; 完了（次回：${nextDate}）`;
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '送信済み（再試行）';
    alert('Notion更新エラー: ' + err.message);
  }
}


// === 取引先画面の初期化 ===
async function initClients() {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading"><div class="spinner"></div>取引先を読み込み中...</div>`;
  document.getElementById('dateInfo').textContent = `${formatDate(today())}｜読み込み中...`;

  try {
    // 送信者・添付資料・定型文を取得（まだ未取得の場合）
    if (senderAccounts.length === 0) {
      const [sendersRes, attachRes, templatesRes] = await Promise.all([
        fetch('/api/senders'),
        fetch('/api/attachments'),
        fetch('/api/templates'),
      ]);
      senderAccounts = await sendersRes.json();
      attachments = await attachRes.json();
      templates = await templatesRes.json();
    }

    // 取引先用送信者ドロップダウン
    const clientSenderSel = document.getElementById('clientSenderSelect');
    if (clientSenderSel.options.length === 0) {
      clientSenderSel.innerHTML = senderAccounts.map(s =>
        `<option value="${s.id}">${s.label}（${s.email}）</option>`
      ).join('');
      clientSenderSel.value = 'kayo';
    }

    // 取引先データ取得
    const res = await fetch('/api/clients/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        channel: clientChannel,
        followStatus: clientFollowFilter,
        limit: 100,
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const pages = data.results || [];
    clientData = pages.map(p => extractClientProps(p));

    document.getElementById('dateInfo').textContent =
      `${formatDate(today())}｜取引先：${clientData.length}件`;

    if (clientData.length === 0) {
      main.innerHTML = `
        <div class="empty">
          <h2>該当する取引先はありません</h2>
          <p>フィルター条件を変更してみてください。</p>
        </div>
      `;
      return;
    }

    main.innerHTML = clientData.map((item, i) => renderClientCard(item, i)).join('');

  } catch (err) {
    main.innerHTML = `
      <div class="empty">
        <h2>読み込みエラー</h2>
        <p>${err.message}</p>
        <p style="margin-top:12px;"><button onclick="initClients()" class="btn btn-done">再試行</button></p>
      </div>
    `;
  }
}

// === 初期化 ===
async function init() {
  document.getElementById('dateInfo').textContent = `${formatDate(today())}｜読み込み中...`;

  // フィルターボタンの状態を復元
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === currentFilter);
  });

  try {
    // 送信者一覧・添付資料・定型文を並列取得
    const [sendersRes, attachRes, templatesRes] = await Promise.all([
      fetch('/api/senders'),
      fetch('/api/attachments'),
      fetch('/api/templates'),
    ]);
    senderAccounts = await sendersRes.json();
    attachments = await attachRes.json();
    templates = await templatesRes.json();

    // 送信者ドロップダウン構築
    const senderSel = document.getElementById('senderSelect');
    const prevVal = senderSel.value;
    senderSel.innerHTML = senderAccounts.map(s =>
      `<option value="${s.id}">${s.label}（${s.email}）</option>`
    ).join('');
    if (prevVal) senderSel.value = prevVal;
    // デフォルトを佳代に
    if (!prevVal) senderSel.value = 'kayo';

    // Notion案件取得（フィルター付き）
    const res = await fetch('/api/notion/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ assignee: currentFilter })
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const pages = data.results || [];
    caseData = pages.map(p => extractProps(p));

    document.getElementById('dateInfo').textContent =
      `${formatDate(today())}｜今日の対応：${caseData.length}件`;

    const main = document.getElementById('main');

    if (caseData.length === 0) {
      main.innerHTML = `
        <div class="empty">
          <h2>今日のフォロー案件はありません</h2>
          <p>お疲れ様です！ゆっくり森の時間を過ごしましょう。</p>
        </div>
      `;
      return;
    }

    // カード描画
    main.innerHTML = caseData.map((item, i) => renderCard(item, i)).join('');

  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div class="empty">
        <h2>読み込みエラー</h2>
        <p>${err.message}</p>
        <p style="margin-top:12px;"><button onclick="location.reload()" class="btn btn-done">再試行</button></p>
      </div>
    `;
  }
}

// === 起動 ===
if (currentTab === 'clients') {
  switchTab('clients');
} else {
  init();
}

// ハッシュ変更でタブ切り替え
window.addEventListener('hashchange', () => {
  const tab = location.hash === '#clients' ? 'clients' : 'sales';
  if (tab !== currentTab) switchTab(tab);
});
</script>
