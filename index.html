<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIKOBAYU｜フォロー管理</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f8faf8;
      color: #333;
      line-height: 1.6;
    }

    /* ヘッダー */
    .header {
      background: #fff;
      border-bottom: 2px solid #d4e8d0;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 20px;
      color: #2d5a27;
      font-weight: 700;
    }
    .header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      font-size: 14px;
      color: #666;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-actions button, .header-actions select {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
    }
    .header-actions button:hover { background: #f0f0f0; }

    /* フィルターバー */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar label { font-size: 13px; color: #666; margin-right: 4px; }
    .filter-btn {
      padding: 5px 14px;
      border: 1px solid #ccc;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #555;
      font-weight: 500;
    }
    .filter-btn.active {
      background: #2d5a27;
      color: #fff;
      border-color: #2d5a27;
    }
    .filter-btn:hover { opacity: 0.85; }

    /* 送信者セレクト */
    .sender-select-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    .sender-select-wrap label { font-size: 13px; color: #666; }
    .sender-select {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      color: #333;
      background: #fff;
    }

    /* メインコンテンツ */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #888;
      font-size: 15px;
    }
    .loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #5a9e4b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 案件カード */
    .card {
      background: #fff;
      border: 1px solid #e0e8de;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d5a27;
    }
    .card-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-見込み段階 { background: #e8e8e8; color: #555; }
    .badge-提案済み   { background: #dbeafe; color: #2563eb; }
    .badge-検討中     { background: #fef3c7; color: #d97706; }
    .badge-反応待ち   { background: #ffe4e4; color: #c0392b; }
    .badge-反応なし   { background: #f0f0f0; color: #999; }
    .badge-industry   { background: #f3e8ff; color: #7c3aed; }
    .badge-assignee   { background: #e0f2fe; color: #0369a1; font-size: 10px; }

    /* コンテキスト入力エリア */
    .context-section {
      padding: 10px 20px 0;
      border-top: 1px solid #f0f0f0;
    }
    .context-section label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    .context-section label span {
      background: #f0f7ee;
      color: #5a9e4b;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 4px;
    }
    .context-textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 54px;
      font-family: inherit;
      color: #444;
    }
    .context-textarea:focus {
      outline: none;
      border-color: #5a9e4b;
      box-shadow: 0 0 0 2px rgba(90,158,75,0.15);
    }

    /* 添付資料セクション */
    .attach-section {
      padding: 10px 20px;
      border-top: 1px solid #f0f0f0;
    }
    .attach-section label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 6px;
    }
    .attach-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .attach-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #555;
      user-select: none;
    }
    .attach-chip.selected {
      background: #e8f5e3;
      border-color: #5a9e4b;
      color: #2d5a27;
    }
    .attach-chip:hover { border-color: #999; }
    .attach-empty {
      font-size: 12px;
      color: #aaa;
    }

    .btn-regen {
      background: #f0f7ee;
      color: #2d5a27;
      border: 1px solid #b6d9b0;
    }

    .card-info {
      padding: 12px 20px;
      font-size: 13px;
      color: #666;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .card-info span { white-space: nowrap; }

    /* メールセクション */
    .mail-section {
      padding: 16px 20px;
      border-top: 1px solid #f0f0f0;
    }
    .mail-section.generating {
      text-align: center;
      padding: 24px;
      color: #888;
    }
    .mail-subject {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }
    .mail-subject-input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .mail-body-textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.7;
      min-height: 160px;
      resize: vertical;
      font-family: inherit;
    }
    .mail-subject-input:focus, .mail-body-textarea:focus {
      outline: none;
      border-color: #5a9e4b;
      box-shadow: 0 0 0 2px rgba(90,158,75,0.15);
    }

    /* アクションボタン */
    .card-actions {
      padding: 12px 20px 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-gmail { background: #4285f4; color: #fff; }
    .btn-done { background: #5a9e4b; color: #fff; }
    .btn-done:disabled { background: #ccc; cursor: not-allowed; }
    .btn-done.completed { background: #e0e0e0; color: #888; }

    /* 設定モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 16px; color: #2d5a27; margin-bottom: 16px; }
    .modal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .modal-item-info { flex: 1; }
    .modal-item-info .name { font-weight: 600; color: #333; }
    .modal-item-info .desc { font-size: 11px; color: #888; }
    .modal-item-info .url { font-size: 11px; color: #4285f4; word-break: break-all; }
    .modal-item-actions { display: flex; gap: 6px; }
    .modal-item-actions button {
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      background: #fff;
    }
    .modal-item-actions button.del { color: #c00; border-color: #fcc; }
    .modal-add {
      margin-top: 12px;
      padding: 12px;
      background: #f8faf8;
      border-radius: 8px;
    }
    .modal-add input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .modal-add button {
      padding: 6px 16px;
      background: #5a9e4b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .modal-close {
      margin-top: 12px;
      padding: 8px 20px;
      background: #eee;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }

    /* 空状態 */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .empty h2 { font-size: 18px; margin-bottom: 8px; color: #5a9e4b; }

    /* タブナビゲーション */
    .tab-nav {
      display: flex;
      gap: 0;
      margin-top: 12px;
      border-bottom: 2px solid #e0e8de;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      color: #888;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #2d5a27;
      border-bottom-color: #2d5a27;
    }
    .tab-btn:hover { color: #5a9e4b; }

    /* 取引先フィルターバー */
    .client-filter-bar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* フォロー種別セレクト */
    .follow-type-select {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      color: #333;
      background: #fff;
      min-width: 140px;
    }


    /* 送信済みカード */
    .card.card-done {
      opacity: 0.55;
      border-color: #ccc;
      background: #f7f7f7;
    }
    .card.card-done .card-title { color: #888; }
    .card-done-banner {
      padding: 8px 20px;
      background: #e8f5e3;
      color: #2d5a27;
      font-size: 13px;
      font-weight: 600;
      border-top: 1px solid #b6d9b0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card.card-done .card-collapsible { display: none; }

    .btn-send-html {
      background: #2d5a27;
      color: #fff;
      flex: 1;
      justify-content: center;
      font-size: 15px;
    }

    /* レスポンシブ */
    @media (max-width: 600px) {
      .header { padding: 14px 16px; }
      .header h1 { font-size: 17px; }
      .card-header { flex-direction: column; }
      .card-actions { flex-direction: column; }
      .btn { justify-content: center; }
      .filter-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>HIKOBAYU フォロー管理</h1>
    <div class="header-meta">
      <span id="dateInfo"></span>
      <div class="header-actions">
        <button onclick="location.reload()">&#x1f504; 更新</button>
        <button onclick="showSentHistory()" id="btn-sent-history">&#x1f4ec; 送信済み一覧</button>
        <button onclick="openAttachSettings()">&#x1f4ce; 資料管理</button>
        <button onclick="openTemplateSettings()">&#x1f4dd; 定型文管理</button>
        <button id="btn-excluded-list" onclick="showExcludedList()" style="color:#c0392b;border-color:#f5c6cb;">&#x1f6ab; 除外一覧</button>
        <button onclick="window.open('https://www.notion.so/748fc885879649a28d91aa1c131f8b58')">&#x1f4ca; Notion</button>
      </div>
    </div>
    <div id="clientFilters">
      <div class="client-filter-bar">
        <label>チャネル：</label>
        <button class="filter-btn active" data-channel="all" onclick="setClientChannel('all')">すべて</button>
        <button class="filter-btn" data-channel="freee" onclick="setClientChannel('freee')">freee/直接</button>
        <button class="filter-btn" data-channel="goooods" onclick="setClientChannel('goooods')">goooods</button>
      </div>
      <div class="client-filter-bar" style="margin-top:6px;">
        <label>ステージ：</label>
        <button class="filter-btn active" data-follow="all" onclick="setClientFollowFilter('all')">すべて</button>
        <button class="filter-btn" data-follow="新規リード" onclick="setClientFollowFilter('新規リード')">新規リード</button>
        <button class="filter-btn" data-follow="商談中" onclick="setClientFollowFilter('商談中')">商談中</button>
        <button class="filter-btn" data-follow="取引中" onclick="setClientFollowFilter('取引中')">取引中</button>
        <button class="filter-btn" data-follow="休眠" onclick="setClientFollowFilter('休眠')">休眠</button>
      </div>
      <div class="sender-select-wrap">
        <label>送信元：</label>
        <select class="sender-select" id="clientSenderSelect"></select>
      </div>
    </div>
  </div>

  <div class="container" id="main">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      案件を読み込み中...
    </div>
  </div>

  <!-- 送信済み一覧ビュー -->
  <div id="sent-history-view" style="display:none;">
    <div class="container">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-top:4px;">
        <button onclick="hideSentHistory()" style="background:none;border:1px solid #ccc;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;">← フォロー一覧へ戻る</button>
        <h2 style="font-size:16px;font-weight:700;color:#2d5a27;margin:0;">📬 送信済み一覧</h2>
        <span id="sent-history-count" style="font-size:12px;color:#888;"></span>
      </div>
      <div id="sent-history-main"></div>
    </div>
  </div>

  <!-- 除外一覧ビュー -->
  <div id="excluded-list-view" style="display:none;">
    <div class="container">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-top:4px;">
        <button onclick="hideExcludedList()" style="background:none;border:1px solid #ccc;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;">← フォロー一覧へ戻る</button>
        <h2 style="font-size:16px;font-weight:700;color:#c0392b;margin:0;">🚫 送信除外一覧</h2>
        <span id="excluded-list-count" style="font-size:12px;color:#888;"></span>
      </div>
      <div style="background:#fff8f8;border:1px solid #f5c6cb;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#7b1f1f;line-height:1.7;">
        ⚠️ 以下の取引先は「<strong>原料仕入先・製造委託先</strong>」または「<strong>メールアドレス未登録</strong>」のため、フォロー候補から除外されています。<br>
        送信ボタンは表示されません（誤送信防止）。
      </div>
      <div id="excluded-list-main"></div>
    </div>
  </div>

  <!-- 添付資料設定モーダル -->
  <div class="modal-overlay" id="attachModal">
    <div class="modal">
      <h2>&#x1f4ce; よく使う添付資料</h2>
      <div id="attachModalList"></div>
      <div class="modal-add">
        <input id="newAttachName" placeholder="資料名（例：営業資料）">
        <input id="newAttachUrl" placeholder="Google Drive 共有リンク">
        <input id="newAttachDesc" placeholder="説明（任意）">
        <button onclick="addAttachment()">追加</button>
      </div>
      <button class="modal-close" onclick="closeAttachSettings()">閉じる</button>
    </div>
  </div>

  <!-- Gmail下書き完了モーダル -->
  <div class="modal-overlay" id="gmailGuideModal" onclick="if(event.target===this)closeGmailModal()">
    <div class="modal" style="max-width:400px;text-align:center;">
      <div style="font-size:40px;margin-bottom:12px;">✅</div>
      <h2 style="margin-bottom:12px;">下書きを作成しました</h2>
      <div style="font-size:14px;color:#555;line-height:1.8;margin-bottom:24px;">
        Gmailで内容を確認して送信してください
      </div>
      <button onclick="confirmOpenGmail()" class="btn btn-send-html" style="width:100%;justify-content:center;font-size:15px;padding:14px;margin-bottom:10px;">
        📨 Gmailで開いて送信を確認する
      </button>
      <button onclick="closeGmailModal()" style="width:100%;background:none;border:1px solid #ccc;border-radius:8px;padding:10px;font-size:14px;cursor:pointer;color:#555;">
        ✕ フォロー一覧に戻る（Gmailは後で）
      </button>
    </div>
  </div>

  <!-- 定型文テンプレート管理モーダル -->
  <div class="modal-overlay" id="templateModal">
    <div class="modal" style="max-width:600px;">
      <h2>&#x1f4dd; 定型文テンプレート</h2>
      <p style="font-size:12px;color:#888;margin-bottom:12px;">登録した定型文は、各カードの入力欄にワンクリックで挿入できます。</p>
      <div id="templateModalList"></div>
      <div class="modal-add">
        <input id="newTemplateName" placeholder="テンプレート名（例：新商品ご案内）">
        <textarea id="newTemplateText" placeholder="定型文の本文を入力…" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px 8px;font-size:13px;min-height:80px;resize:vertical;font-family:inherit;margin-bottom:6px;"></textarea>
        <input id="newTemplateImage" placeholder="画像URL（任意・Google DriveやShopifyなど）">
        <button onclick="addTemplate()">追加</button>
      </div>
      <button class="modal-close" onclick="closeTemplateSettings()">閉じる</button>
    </div>
  </div>


<script>
// === グローバル状態 ===
let senderAccounts = [];
let attachments = [];
let templates = [];
let clientData = [];
let excludedClientData = []; // 取引区分除外レコード
let clientChannel = 'all';
let clientFollowFilter = 'all';
let clientOriginalMails = {};

// === localStorage: 送信済み非表示リスト ===
const LS_HIDDEN_KEY = 'hf_hidden_clients';
function getHiddenClients() {
  try { return JSON.parse(localStorage.getItem(LS_HIDDEN_KEY) || '[]'); } catch { return []; }
}
function setHiddenClients(list) {
  localStorage.setItem(LS_HIDDEN_KEY, JSON.stringify(list));
}
function isClientHidden(clientId) {
  return getHiddenClients().some(h => h.clientId === clientId);
}

// 送信完了後の一時データ（index → payload）
const _pendingSentData = {};

// 再送・追加送信で強制表示するclientIdセット（Notionフィルタも上書き）
const _forceShowClients = new Set();


// === ユーティリティ ===
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return str.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// === コンタクト履歴から最新を取得 ===
async function loadLatestContact(clientId, index) {
  try {
    const res = await fetch(`/api/contacts/latest/${clientId}`);
    const data = await res.json();
    const el = document.getElementById(`prev-action-${index}`);
    if (!el) return;

const _cardHtmlCache = {}; // index → htmlEmail のキャッシュ

// Gmail送信フロー（カード内から直接）
let _gmailPendingContext = null; // モーダルOK後に使うURL＆index

async function sendViaGmail(index) {
  const item = clientData[index];
  const subject = document.getElementById(`client-subject-${index}`)?.value || '';
  const senderSel = document.getElementById('clientSenderSelect');
  const senderId = senderSel?.value || 'company';
  const htmlEmail = _cardHtmlCache[index];

  if (!item.email) { alert('メールアドレスが登録されていません'); return; }
  if (!subject.trim()) { alert('件名を入力してください'); return; }
  if (!htmlEmail) { alert('メールを生成してください'); return; }

  // 選択された添付資料をHTMLに埋め込む
  let htmlBody = htmlEmail;
  const attachChips = document.querySelectorAll(`#client-attach-panel-${index} .attach-chip.selected`);
  if (attachChips.length > 0) {
    let attachSection = `<tr><td style="padding:8px 40px 24px;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;">`;
    attachSection += `<p style="margin:0 0 8px;font-size:13px;color:#666666;font-weight:bold;">【添付資料】</p>`;
    attachChips.forEach(chip => {
      const name = chip.dataset.name;
      const url = chip.dataset.url;
      if (url) {
        attachSection += `<p style="margin:0 0 4px;font-size:13px;"><a href="${url}" style="color:#5a9e4b;">${name}</a></p>`;
      } else {
        attachSection += `<p style="margin:0 0 4px;font-size:13px;color:#333;">${name}</p>`;
      }
    });
    attachSection += `</td></tr>`;
    htmlBody = htmlBody.replace(
      `<tr><td style="padding:24px 40px 8px;border-top:1px solid #f0ede8;`,
      attachSection + `<tr><td style="padding:24px 40px 8px;border-top:1px solid #f0ede8;`
    );
  }

  // 送信ボタンを無効化
  const btn = document.querySelector(`#client-actions-${index} .btn-send-html`);
  if (btn) { btn.disabled = true; btn.textContent = '下書き作成中...'; }

  try {
    // Gmail API で下書き作成（clientId を渡して除外二重チェック）
    const res = await fetch('/api/create-gmail-draft', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: item.email, subject, htmlBody, senderId, clientId: item.id }),
    });
    const data = await res.json();

    // 未認証の場合 → 認証ページへ誘導
    if (res.status === 401) {
      if (confirm(`Gmail API の認証が必要です。認証ページを開きますか？`)) {
        window.open(data.authUrl, '_blank');
      }
      if (btn) { btn.disabled = false; btn.textContent = '✉ 送信'; }
      return;
    }
    // 除外対象ブロック
    if (res.status === 403) {
      alert(`⚠️ ${data.error}`);
      if (btn) { btn.disabled = false; btn.textContent = '✉ 送信'; }
      return;
    }
    if (!res.ok) throw new Error(data.error || 'エラー');

    // Notion に自動記録（非同期）
    fetch('/api/log-email-sent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clientId: item.id, clientName: item.name, subject, contactDate: today() }),
    }).catch(e => console.warn('Notion記録エラー:', e));

    // モーダル表示
    _gmailPendingContext = { draftUrl: data.draftUrl, index };
    document.getElementById('gmailGuideModal').classList.add('show');

  } catch (err) {
    alert('エラー: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = '✉ 送信'; }
  }
}

// 「✅ 送信済みにする」ボタン処理
async function markAsSent(index) {
  const item = clientData[index];
  if (!item) return;

  const payload = _pendingSentData[index] || {};
  const subject = document.getElementById(`client-subject-${index}`)?.value
    || payload.subject || '';

  // localStorage に保存
  const hidden = getHiddenClients();
  if (!hidden.find(h => h.clientId === item.id)) {
    hidden.push({
      clientId: item.id,
      name: item.name,
      contact: item.contact || '',
      email: item.email || '',
      sentAt: new Date().toISOString(),
      subject,
      senderEmail: payload.senderEmail || '',
      templateNames: payload.templateNames || '',
      attachNames: payload.attachNames || '',
    });
    setHiddenClients(hidden);
  }

  // カードをフェードアウトして非表示
  const card = document.getElementById(`client-card-${index}`);
  if (card) {
    card.style.transition = 'opacity 0.4s';
    card.style.opacity = '0';
    setTimeout(() => { card.style.display = 'none'; }, 400);
  }

  // sessionStorage のメール状態もクリア
  try { sessionStorage.removeItem('hf_mail_' + item.id); } catch(e) {}
  delete _pendingSentData[index];
}

// === テキスト→HTML変換（Claude生成テキストをメール本文HTML化） ===
function textToHtml(text) {
  // 連続する改行でパラグラフ分割、単一改行は<br>
  return text
    .split(/\n{2,}/)
    .map(para => {
      const lines = para.replace(/\n/g, '<br>');
      return `<p>${lines}</p>`;
    })
    .join('');
}

// === 取引先メール生成 ===
async function generateClientMail(index) {
  const item = clientData[index];
  const mailEl = document.getElementById(`client-mail-${index}`);
  mailEl.className = 'mail-section generating';
  mailEl.innerHTML = `<div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto 6px;"></div>メール文を生成中...`;
  document.getElementById(`client-actions-${index}`).style.display = 'none';

  const senderSel = document.getElementById('clientSenderSelect');
  const sender = senderAccounts.find(s => s.id === senderSel.value) || senderAccounts[0];

  // 前回の対応内容（テキストエリアの現在の値）
  const prevActionEl = document.getElementById(`prev-action-${index}`);
  const previousAction = prevActionEl ? prevActionEl.value : (item.latestContactMemo || '');

  // 定型文テキスト（定型文エリアの現在の値）
  const templateTextEl = document.getElementById(`template-text-${index}`);
  const templateContext = templateTextEl ? templateTextEl.value : '';

  // 選択中の添付資料名
  const selectedAttachChips = document.querySelectorAll(`#client-attach-panel-${index} .attach-chip.selected`);
  const attachNames = Array.from(selectedAttachChips).map(el => el.dataset.name).filter(Boolean).join('、');

  try {
    const res = await fetch('/api/claude/generate-client', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientInfo: {
          name: item.name,
          contact: item.contact,
          channel: item.channel,
          orderHistory: item.orderHistory,
          business: item.business,
          stage: item.stage,
          previousAction,
          memo: item.memo,
          extraContext: templateContext,
          attachNames,
        },
        senderId: sender.id,
      })
    });
    const data = await res.json();

    // パース：content配列から全textブロックを結合
    const text = (data.content || [])
      .filter(block => block.type === 'text')
      .map(block => block.text)
      .join('');

    const jsonMatch = text.match(/\{[\s\S]*?"subject"[\s\S]*?"body"[\s\S]*\}/);
    if (jsonMatch) {
      const mail = JSON.parse(jsonMatch[0]);
      clientOriginalMails[index] = { subject: mail.subject, body: mail.body };
      renderClientMailSection(index, item, mail.subject, mail.body);
    } else {
      console.error('Claude APIレスポンス（パース失敗）:', data);
      throw new Error('メール生成結果のパースに失敗（コンソール確認）');
    }
  } catch (err) {
    mailEl.classList.remove('generating');
    mailEl.innerHTML = `<div style="color:#c00;padding:8px;">メール生成エラー: ${err.message}</div>`;
  }
}

function renderClientMailSection(index, item, subject, body) {
  // sessionStorage に保存（ブラウザバック対策）
  try {
    sessionStorage.setItem('hf_mail_' + item.id, JSON.stringify({ subject, body }));
  } catch(e) {}

  const mailEl = document.getElementById(`client-mail-${index}`);
  mailEl.classList.remove('generating');

  // 変数置換
  const vars = { facility_name: item.name || '', name: item.contact || '' };
  const subjectSub = (subject || '').replace(/\{\{facility_name\}\}/g, vars.facility_name).replace(/\{\{name\}\}/g, vars.name);
  const bodySub = (body || '').replace(/\{\{facility_name\}\}/g, vars.facility_name).replace(/\{\{name\}\}/g, vars.name);

  // HTML メールプレビューを構築してキャッシュ
  const bodyHtml = textToHtml(bodySub);
  const senderSelForCache = document.getElementById('clientSenderSelect');
  const senderIdForCache = senderSelForCache?.value || 'company';
  const htmlEmail = buildHtmlEmailClient(bodyHtml, null, senderIdForCache);
  _cardHtmlCache[index] = htmlEmail;

  mailEl.innerHTML = `
    <div class="mail-subject">件名：</div>
    <input class="mail-subject-input" id="client-subject-${index}" value="${escapeAttr(subjectSub)}">
    <div style="border:1px solid #e0d8cc;border-radius:8px;overflow:hidden;margin-top:8px;background:#f9f9f7;">
      <iframe id="client-preview-iframe-${index}" style="width:100%;border:none;height:420px;display:block;"></iframe>
    </div>
  `;

  // iframe に HTML をセット
  const iframe = document.getElementById(`client-preview-iframe-${index}`);
  iframe.srcdoc = htmlEmail;
  iframe.onload = () => {
    try {
      const h = iframe.contentDocument?.body?.scrollHeight;
      if (h && h > 100) iframe.style.height = (h + 20) + 'px';
    } catch(e) {}
  };

  const actionsEl = document.getElementById(`client-actions-${index}`);
  actionsEl.style.display = 'flex';
  actionsEl.innerHTML = `
    <button class="btn btn-send-html" onclick="sendViaGmail(${index})" style="flex:1;justify-content:center;">
      &#x2709; 送信（下書き作成）
    </button>
    <button class="btn btn-regen" onclick="generateClientMail(${index})" style="padding:8px 12px;">
      &#x1f504; 再生成
    </button>
  `;
}

// === 定型文でそのまま Gmail 下書き作成（AI生成なし）===
async function sendDirectViaGmail(index) {
  const item = clientData[index];
  if (!item.email) { alert('メールアドレスが登録されていません'); return; }

  const senderSel = document.getElementById('clientSenderSelect');
  const senderId = senderSel?.value || 'company';

  // 定型文テキストを取得
  const templateTextEl = document.getElementById(`template-text-${index}`);
  const templateText = templateTextEl?.value?.trim() || '';
  if (!templateText) { alert('定型文を選択してください'); return; }

  // 件名：定型文の1行目、または施設名を使ったデフォルト
  const firstLine = templateText.split('\n')[0].replace(/^#+\s*/, '').trim();
  const vars = { facility_name: item.name || '', name: item.contact || '' };
  const subject = (firstLine || `${item.name} 様へのご連絡`)
    .replace(/\{\{facility_name\}\}/g, vars.facility_name)
    .replace(/\{\{name\}\}/g, vars.name);

  // 添付資料リンクを本文末尾に付与
  const attachLinks = getClientSelectedAttachLinks(index);
  const fullText = templateText + attachLinks;

  // 変数置換してHTML化
  const substituted = fullText
    .replace(/\{\{facility_name\}\}/g, vars.facility_name)
    .replace(/\{\{name\}\}/g, vars.name);
  const bodyHtml = textToHtml(substituted);
  const htmlEmail = buildHtmlEmailClient(bodyHtml, null, senderId);

  // ボタンを「作成中」に
  const mailEl = document.getElementById(`client-mail-${index}`);
  const btn = mailEl.querySelector('button.btn-gmail');
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '下書き作成中...';

  try {
    const res = await fetch('/api/create-gmail-draft', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: item.email, subject, htmlBody: htmlEmail, senderId, clientId: item.id }),
    });
    const data = await res.json();
    if (data.authUrl) {
      alert('Gmail認証が必要です。このPCで認証してから再試行してください。\n' + data.authUrl);
      btn.disabled = false; btn.textContent = origText; return;
    }
    if (res.status === 403) {
      alert(`⚠️ ${data.error}`);
      btn.disabled = false; btn.textContent = origText; return;
    }
    if (!data.ok) throw new Error(data.error || '下書き作成失敗');
    _gmailPendingContext = {
      draftUrl: data.draftUrl,
      index,
      notionPayload: {
        clientId: item.id,
        clientName: item.name,
        subject,
        senderEmail: (senderAccounts.find(s => s.id === senderId) || {}).email || '',
        contactEmail: item.email || '',
        templateNames: Array.from(document.querySelectorAll(`#template-panel-${index} .attach-chip.selected`))
          .map(c => c.textContent.replace(/^📝\s*/, '').trim()).join('、'),
        attachNames: Array.from(document.querySelectorAll(`#client-attach-panel-${index} .attach-chip.selected`))
          .map(c => c.dataset.name).join('、'),
      }
    };
    document.getElementById('gmailGuideModal').classList.add('show');
  } catch (err) {
    alert('エラー: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
}

function getClientSelectedAttachLinks(index) {
  const chips = document.querySelectorAll(`#client-attach-panel-${index} .attach-chip.selected`);
  if (chips.length === 0) return '';
  let links = '\n\n---\n【添付資料】\n';
  chips.forEach(chip => {
    const name = chip.dataset.name;
    const url = chip.dataset.url;
    if (url) links += `${name}: ${url}\n`;
  });
  return links;
}

function buildClientGmailLink(index) {
  const item = clientData[index];
  const senderSel = document.getElementById('clientSenderSelect');
  const from = senderAccounts.find(s => s.id === senderSel.value)?.email || '';
  const subject = document.getElementById(`client-subject-${index}`).value;
  const body = document.getElementById(`client-body-${index}`).value + getClientSelectedAttachLinks(index);
  const params = new URLSearchParams({ to: item.email, su: subject, body });
  if (from) params.set('from', from);
  return `https://mail.google.com/mail/?view=cm&${params.toString()}`;
}

// === 取引先 送信済みボタン ===
async function markClientDone(index) {
  const item = clientData[index];
  const btn = document.getElementById(`client-done-${index}`);
  btn.disabled = true;
  btn.textContent = '更新中...';

  const todayStr = today();
  const nextDate = addDays(todayStr, 30);
  const subjectEl = document.getElementById(`client-subject-${index}`);
  const subject = subjectEl?.value || '';

  // 送信情報を収集
  const senderSel = document.getElementById('clientSenderSelect');
  const sender = senderAccounts.find(s => s.id === senderSel?.value) || senderAccounts[0];
  const templateChips = document.querySelectorAll(`#template-panel-${index} .attach-chip.selected`);
  const attachChips   = document.querySelectorAll(`#client-attach-panel-${index} .attach-chip.selected`);
  const templateNames = Array.from(templateChips).map(c => c.textContent.replace(/^📝\s*/, '').trim()).join('、') || '';
  const attachNames   = Array.from(attachChips).map(c => c.dataset.name).join('、') || '';

  // 1. コンタクト履歴DBにレコード作成（詳細付き）
  try {
    await fetch('/api/contacts/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: item.id,
        clientName: item.name,
        subject,
        contactDate: todayStr,
        senderEmail: sender?.email || '',
        contactEmail: item.email || '',
        templateNames,
        attachNames,
      })
    });
  } catch (e) {
    console.warn('コンタクト履歴作成エラー:', e);
  }

  // 2. 取引先マスターの前回フォロー日を今日に更新・次回フォロー日をセット
  try {
    const res = await fetch(`/api/clients/update/${item.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nextFollowDate: nextDate,
        lastFollowDate: todayStr,
      })
    });
    if (!res.ok) throw new Error('更新に失敗しました');

    const bannerText = `送信済み（次回フォロー：${nextDate}）`;
    applyCardDone(index, bannerText);
    // sessionStorage にも保存してブラウザバック後も維持
    try { sessionStorage.setItem('hf_done_' + item.id, bannerText); } catch(e) {}

  } catch (err) {
    btn.disabled = false;
    btn.textContent = '送信済み（再試行）';
    alert('Notion更新エラー: ' + err.message);
  }
}

async function initSentHistory() {
  const el = document.getElementById('sent-history-main');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  // localStorage の非表示カードを先に表示（上部に）
  const hiddenClients = getHiddenClients().slice().reverse(); // 新しい順

  try {
    const res = await fetch('/api/contacts/list?limit=50');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const notionItems = data.results || [];

    // localStorage アイテムを Notion 形式に変換（clientId が Notion にもある場合は重複除外）
    const notionClientIds = new Set(notionItems.map(i => i.clientId).filter(Boolean));
    const localItems = hiddenClients
      .filter(h => !notionClientIds.has(h.clientId))
      .map(h => ({
        id: null,
        title: `${h.sentAt?.slice(0,10) || today()} ${h.name} メール送信`,
        contactDate: h.sentAt?.slice(0,10) || today(),
        clientId: h.clientId,
        subject: h.subject,
        sentAt: h.sentAt,
        senderEmail: h.senderEmail,
        contactEmail: h.email,
        templateNames: h.templateNames,
        attachNames: h.attachNames,
        _fromLocal: true,
      }));

    const allItems = [...localItems, ...notionItems];
    document.getElementById('sent-history-count').textContent = `（${allItems.length} 件）`;

    if (allItems.length === 0) {
      el.innerHTML = '<div class="empty"><h2>送信履歴がありません</h2></div>';
      return;
    }
    el.innerHTML = allItems.map(renderSentHistoryCard).join('');
  } catch (err) {
    // Notion 失敗でも localStorage 分は表示する
    const localItems = hiddenClients.map(h => ({
      id: null, title: `${h.sentAt?.slice(0,10)||today()} ${h.name} メール送信`,
      contactDate: h.sentAt?.slice(0,10)||today(), clientId: h.clientId,
      subject: h.subject, senderEmail: h.senderEmail, contactEmail: h.email,
      templateNames: h.templateNames, attachNames: h.attachNames, _fromLocal: true,
    }));
    document.getElementById('sent-history-count').textContent = `（${localItems.length} 件・Notionエラー）`;
    el.innerHTML = localItems.length
      ? localItems.map(renderSentHistoryCard).join('')
      : `<div class="empty"><h2>読み込みエラー</h2><p>${err.message}</p></div>`;
  }
}

function renderSentHistoryCard(item) {
  const dateStr = item.contactDate ? item.contactDate.replace(/-/g, '/') : '—';
  const rows = [
    item.subject      ? `<tr><td style="color:#888;white-space:nowrap;padding:3px 12px 3px 0;font-size:12px;">件名</td><td style="font-size:13px;">${escapeHtml(item.subject)}</td></tr>` : '',
    item.senderEmail  ? `<tr><td style="color:#888;white-space:nowrap;padding:3px 12px 3px 0;font-size:12px;">送信者</td><td style="font-size:13px;">${escapeHtml(item.senderEmail)}</td></tr>` : '',
    item.contactEmail ? `<tr><td style="color:#888;white-space:nowrap;padding:3px 12px 3px 0;font-size:12px;">宛先</td><td style="font-size:13px;">${escapeHtml(item.contactEmail)}</td></tr>` : '',
    item.templateNames? `<tr><td style="color:#888;white-space:nowrap;padding:3px 12px 3px 0;font-size:12px;">定型文</td><td style="font-size:13px;">${escapeHtml(item.templateNames)}</td></tr>` : '',
    item.attachNames  ? `<tr><td style="color:#888;white-space:nowrap;padding:3px 12px 3px 0;font-size:12px;">添付資料</td><td style="font-size:13px;">${escapeHtml(item.attachNames)}</td></tr>` : '',
  ].filter(Boolean).join('');

  // タイトルから会社名を抽出（"YYYY-MM-DD 会社名 メール送信"）
  const titleMatch = item.title.match(/^\d{4}-\d{2}-\d{2}\s+(.+?)\s+メール送信$/);
  const companyName = titleMatch ? titleMatch[1] : item.title;

  const resendBtn = item.clientId
    ? `<button onclick="resendToClient('${item.clientId}')" style="background:#f0f7ee;border:1px solid #b6d9b0;color:#2d5a27;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;">↩ 再送・追加送信</button>`
    : '';

  return `
    <div class="card" style="margin-bottom:12px;">
      <div class="card-header" style="padding:12px 20px;">
        <div>
          <div class="card-title" style="font-size:15px;">${escapeHtml(companyName)}</div>
          <div style="font-size:12px;color:#888;margin-top:2px;">📅 ${dateStr}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
          ${resendBtn}
        </div>
      </div>
      ${rows ? `<div style="padding:10px 20px 14px;border-top:1px solid #f0f0f0;"><table style="border-collapse:collapse;">${rows}</table></div>` : ''}
    </div>`;
}

async function resendToClient(clientId) {
  // 非表示リストから削除して再表示できるようにする
  setHiddenClients(getHiddenClients().filter(h => h.clientId !== clientId));
  // Notionの送信済みフィルタも上書きするよう強制表示セットに追加
  _forceShowClients.add(clientId);
  hideSentHistory();
  clientChannel = 'all';
  clientFollowFilter = 'all';
  document.querySelectorAll('[data-channel]').forEach(b => b.classList.toggle('active', b.dataset.channel === 'all'));
  document.querySelectorAll('[data-follow]').forEach(b => b.classList.toggle('active', b.dataset.follow === 'all'));
  await initClients();
  // 対象カードを探してスクロール
  const idx = clientData.findIndex(c => c.id === clientId);
  if (idx !== -1) {
    const card = document.getElementById(`client-card-${idx}`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.outline = '3px solid #5a9e4b';
      setTimeout(() => { card.style.outline = ''; }, 2000);
    }
  }
}

// === 取引先画面の初期化 ===
async function initClients() {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading"><div class="spinner"></div>取引先を読み込み中...</div>`;
  document.getElementById('dateInfo').textContent = `${formatDate(today())}｜読み込み中...`;

  try {
    // 送信者・添付資料・定型文を取得（まだ未取得の場合）
    if (senderAccounts.length === 0) {
      const [sendersRes, attachRes, templatesRes] = await Promise.all([
        fetch('/api/senders'),
        fetch('/api/attachments'),
        fetch('/api/templates'),
      ]);
      senderAccounts = await sendersRes.json();
      attachments = await attachRes.json();
      templates = await templatesRes.json();
    }

    // 取引先用送信者ドロップダウン
    const clientSenderSel = document.getElementById('clientSenderSelect');
    if (clientSenderSel.options.length === 0) {
      clientSenderSel.innerHTML = senderAccounts.map(s =>
        `<option value="${s.id}">${s.label}（${s.email}）</option>`
      ).join('');
      clientSenderSel.value = 'company';
    }

    // 取引先データ取得
    const res = await fetch('/api/clients/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        channel: clientChannel,
        stage: clientFollowFilter,
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const pages = data.results || [];

    // 送信済みフィルタ: Notion（複数ブラウザ共有）+ localStorage（即時反映）
    let notionSentIds = new Set();
    try {
      const sentRes = await fetch('/api/sent-today');
      const sentData = await sentRes.json();
      notionSentIds = new Set(sentData.clientIds || []);
    } catch(e) { console.warn('sent-today取得失敗（フィルタをスキップ）', e); }
    const localHiddenIds = new Set(getHiddenClients().map(h => h.clientId));
    // _forceShowClients（再送ボタン押下）はNotion・localStorageフィルタを上書き
    const hiddenIds = new Set(
      [...notionSentIds, ...localHiddenIds].filter(id => !_forceShowClients.has(id))
    );

    const allExtracted = pages.map(p => extractClientProps(p));

    // === DEBUG Phase1 ===
    console.log('[DEBUG] allExtracted件数:', allExtracted.length);
    allExtracted.forEach(item => {
      console.log(`[DEBUG] ${item.name} | transactionCategory: ${JSON.stringify(item.transactionCategory)} | isExcluded: ${isExcluded(item)}`);
    });
    // === END DEBUG ===

    excludedClientData = allExtracted.filter(item => isExcluded(item));
    clientData = allExtracted.filter(item => !isExcluded(item) && !hiddenIds.has(item.id));

    document.getElementById('dateInfo').textContent =
      `${formatDate(today())}｜取引先：${clientData.length}件`;

    // 除外件数バッジ更新
    const excBtn = document.getElementById('btn-excluded-list');
    if (excBtn) {
      excBtn.textContent = excludedClientData.length > 0
        ? `🚫 除外一覧（${excludedClientData.length}）`
        : '🚫 除外一覧';
    }

    if (clientData.length === 0) {
      main.innerHTML = `
        <div class="empty">
          <h2>該当する取引先はありません</h2>
          <p>フィルター条件を変更してみてください。</p>
        </div>
      `;
      return;
    }

    main.innerHTML = clientData.map((item, i) => renderClientCard(item, i)).join('');
    // コンタクト履歴を非同期で各カードに表示
    clientData.forEach((item, i) => loadLatestContact(item.id, i));
    // ブラウザバック後の状態復元
    clientData.forEach((item, i) => {
      try {
        const saved = sessionStorage.getItem('hf_mail_' + item.id);
        if (saved) {
          const { subject, body } = JSON.parse(saved);
          renderClientMailSection(i, item, subject, body);
        }
        if (sessionStorage.getItem('hf_done_' + item.id)) {
          const banner = sessionStorage.getItem('hf_done_' + item.id);
          applyCardDone(i, banner);
        }
      } catch(e) {}
    });

  } catch (err) {
    main.innerHTML = `
      <div class="empty">
        <h2>読み込みエラー</h2>
        <p>${err.message}</p>
        <p style="margin-top:12px;"><button onclick="initClients()" class="btn btn-done">再試行</button></p>
      </div>
    `;
  }
}

// === 起動 ===
initClients();
</script>


</body>
</html>
